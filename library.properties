name=UngulaEncoder
version=1.2.0
author=Alex Conesa <alexconesap@gmail.com>
maintainer=Alex Conesa <alexconesap@gmail.com>
sentence=High-performance embedded C++ libraries for ESP32, STM32 and other MCUs: encoder drivers with calibrated output in degrees / radians.
paragraph=Embedded C++17 encoder stack. Transport-agnostic IEncoder interface (no I2C, multiplexer or pin numbers leak into the base) with concrete drivers carrying their own bus and wiring. AS5600 over I2C is shipping today (As5600I2c, multiplexer optional); SPI / PWM / ABI drivers are queued for follow-up phases. Calibrated output in degrees / radians. Supported targets: ESP32 today via UngulaHal.
category=Sensors
url=https://github.com/alexconesap/ungula-encoder.git
includes=ungula_encoder.h
depends=UngulaCore,UngulaHal
architectures=esp32,esp32-s3
