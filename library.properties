name=UngulaEncoder
version=1.4.0
author=Alex Conesa <alexconesap@gmail.com>
maintainer=Alex Conesa <alexconesap@gmail.com>
sentence=High-performance embedded C++ libraries for ESP32, STM32 and other MCUs: encoder drivers with calibrated output in degrees / radians.
paragraph=Embedded C++17 encoder stack. Transport-agnostic IEncoder interface (no I2C, multiplexer or pin numbers leak into the base) with concrete drivers carrying their own bus and wiring. AS5600: As5600I2c (I2C, mux optional), As5600Pwm (PWM only), As5600I2cPwm (I2C + PWM combined). SPI: As5047pSpi (14-bit, magnet diag), Ma730Spi (14-bit), Mt6835Spi (21-bit, in-band CRC). ABI / quadrature: Mt6701Abi via UngulaHal IDecoder (ESP32 PCNT). Calibrated output in degrees / radians. Supported targets: ESP32 today via UngulaHal.
category=Sensors
url=https://github.com/alexconesap/ungula-encoder.git
includes=ungula_encoder.h
depends=UngulaCore,UngulaHal
architectures=esp32,esp32-s3
